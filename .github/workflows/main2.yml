name: Yoru Kernel

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Masukkan Commit SHA (Kosongkan untuk build commit terbaru)'
        required: false
        default: ''
  watch:
    types: [started]

defaults:
  run:
    shell: bash

jobs:
  buildtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Membaca input commit hash jika diisi, jika kosong akan mengambil yang terbaru
          ref: ${{ github.event.inputs.commit_hash }}

      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5

      - name: Install Packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            dialog bash sed wget git curl zip tar jq expect make cmake automake autoconf \
            llvm lld lldb clang gcc binutils bison perl gperf gawk flex bc python3 zstd \
            openssl unzip cpio build-essential ccache liblz4-tool libsdl1.2-dev libstdc++6 \
            libxml2 libxml2-utils lzop pngcrush schedtool squashfs-tools xsltproc zlib1g-dev \
            libncurses5-dev bzip2 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf \
            gcc-arm-linux-gnueabi dos2unix kmod

      - name: Setup KernelSU (Legacy)
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Apply KernelSU 4.9 Compatibility Patch
        run: |
          # Perbaikan Jalur: Kita gunakan -p2 untuk membuang 'a/kernel/' 
          # dan langsung menubrukkan sisanya ke 'drivers/kernelsu'
          echo "Applying compatibility patch..."
          git apply -p2 --directory=drivers/kernelsu 4.9ksuncompatbility.patch
          echo "✓ Patch applied successfully."

      - name: Fix Kbuild Routing for Linux 4.9
        run: |
          # Mengamankan kompilasi otomatis karena semua file sekarang berada langsung
          # di bawah drivers/kernelsu/ (feature, sulog, infra, dll)
          if [ -f drivers/kernelsu/Makefile ]; then
            echo "" >> drivers/kernelsu/Makefile
            echo "# Aturan objek wajib untuk KernelSU-Next di Kernel 4.9" >> drivers/kernelsu/Makefile
            echo "obj-y += feature/" >> drivers/kernelsu/Makefile
            echo "obj-y += sulog/" >> drivers/kernelsu/Makefile
            echo "obj-y += infra/" >> drivers/kernelsu/Makefile
            echo "obj-y += runtime/" >> drivers/kernelsu/Makefile
          fi
          echo "✓ Kbuild routing secured."
         
      - name: Start Build (with log)
        env:
          KBUILD_BUILD_USER: "Hoshino"
          KBUILD_BUILD_HOST: "Yoru"
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          touch .scmversion
          mkdir -p logs
          rm -rf out
          bash build.sh 2>&1 | tee logs/build.txt

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.txt

      - name: Upload AnyKernel Zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: anykernel-zip
          path: AnyKernel/*.zip

      - name: Upload Kernel Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz
          path: out/arch/arm64/boot/Image.gz

      - name: Upload DTB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: image-gz-dtb
          path: out/arch/arm64/boot/Image.gz-dtb
          
